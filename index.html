<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Reconeixedora de Formes</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/ort.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f4f4f9; margin-top: 50px; }
        canvas { 
            border: 5px solid #333; 
            background-color: white; 
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            cursor: crosshair; 
            display: block; 
            margin: 20px auto;
            touch-action: none; 
        }
        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            margin: 10px; 
            border: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        #botoPredir { background-color: #2ecc71; color: white; }
        #clearBtn { background-color: #e74c3c; color: white; }
        button:hover { opacity: 0.8; }
        #resultat { color: #2c3e50; font-size: 28px; margin-top: 20px; min-height: 40px; }
    </style>
</head>
<body>

    <h1>Dibuixa un Cercle, Quadrat o Triangle</h1>
    <canvas id="pissarra" width="280" height="280"></canvas>
    
    <div>
        <button id="botoPredir">Endevina la forma!</button>
        <button id="clearBtn">Netejar pissarra</button>
    </div>

    <h3 id="resultat">Fes un dibuix i clica el botó verd</h3>

    <script src="index.js"></script>
</body>
</html>
